name: Fake Helm Push Charts

on:
  push:
    branches: [ghi223/test01, ghi223/test03-*]
    tags: ["test-tag-*"]
    paths:
      - 'coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  pull_request:
    branches: [ghi223/*]
    paths:
      - 'coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  workflow_dispatch:

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo
  HELM_SUBDIR: deployment/helm

jobs:
  subprojects-to-build:
    runs-on: ubuntu-latest
    outputs:
      build_corto: ${{ steps.check-subprojects.outputs.build_corto }}
      build_lungo: ${{ steps.check-subprojects.outputs.build_lungo }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Detect changed paths for main sub-projects
        id: check-subprojects
        run: |
          build_corto=false
          build_lungo=false

          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == refs/tags/* || "${{ github.ref }}" == refs/heads/main || "${{ github.ref }}" == refs/heads/ghi223/* ) ]]; then
            build_corto=true
            build_lungo=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            # Returns 0 if dir has changes, 1 if no changes
            dir_has_changes() (
              local base=$1 head=$2 dir=$3
              set -x # This option only lives in the subshell of this function because the function is defined with () instead of {}.
              ! git diff --name-only --exit-code --ignore-blank-lines $base $head "$dir"
            )
            dir_has_changes $base $head "$CORTO_DIR/$HELM_SUBDIR" && build_corto=true || build_corto=false
            dir_has_changes $base $head "$LUNGO_DIR/$HELM_SUBDIR" && build_lungo=true || build_lungo=false
          fi

          echo "build_corto=$build_corto" | tee -a $GITHUB_OUTPUT
          echo "build_lungo=$build_lungo" | tee -a $GITHUB_OUTPUT

  helm-package-corto:
    needs: subprojects-to-build
    if: ${{ needs.subprojects-to-build.outputs.build_corto == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        chart:
          - name: corto-ui
            path: coffeeAGNTCY/coffee_agents/corto/deployment/helm/corto-ui
            package_name: corto-ui

    permissions:
      packages: write
      contents: read

    steps:
      - name: Pre-cleanup Docker images
        run: docker system prune -af

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log Pull Request Event
        if: github.event_name == 'pull_request'
        run: echo "PR detected - Packaging Helm chart (no push)"

      - name: Log Push Event
        if: github.event_name == 'push'
        run: echo "Push to main - Packaging and pushing Helm chart"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.18.3"

      - name: Helm lint
        run: helm lint ${{ matrix.chart.path }} --with-subcharts

      - name: Package Helm Chart
        id: package
        run: |
          CHART_VERSION=$(grep '^version:' ${{ matrix.chart.path }}/Chart.yaml | awk '{print $2}')
          helm package ${{ matrix.chart.path }} --dependency-update --version $CHART_VERSION
          echo "chart_version=$CHART_VERSION" | tee -a $GITHUB_OUTPUT

      - name: Push Helm Chart
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/ghi223'))
        run: |
          helm push ${{ matrix.chart.package_name }}-${{ steps.package.outputs.chart_version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/coffee_agntcy/helm

  helm-package-lungo:
    needs: subprojects-to-build
    if: ${{ needs.subprojects-to-build.outputs.build_lungo == 'true' }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        chart:
          - name: lungo-ui
            path: coffeeAGNTCY/coffee_agents/lungo/deployment/helm/ui
            package_name: lungo-ui

    permissions:
      packages: write
      contents: read

    steps:
      - name: Pre-cleanup Docker images
        run: docker system prune -af

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Log Pull Request Event
        if: github.event_name == 'pull_request'
        run: echo "PR detected - Packaging Helm chart (no push)"

      - name: Log Push Event
        if: github.event_name == 'push'
        run: echo "Push to main - Packaging and pushing Helm chart"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.18.3"

      - name: Helm lint
        run: helm lint ${{ matrix.chart.path }} --with-subcharts

      - name: Package Helm Chart
        id: package
        run: |
          CHART_VERSION=$(grep '^version:' ${{ matrix.chart.path }}/Chart.yaml | awk '{print $2}')
          helm package ${{ matrix.chart.path }} --dependency-update --version $CHART_VERSION
          echo "chart_version=$CHART_VERSION" | tee -a $GITHUB_OUTPUT

      - name: Push Helm Chart
        if: false && github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/ghi223'))
        run: |
          helm push ${{ matrix.chart.package_name }}-${{ steps.package.outputs.chart_version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/coffee_agntcy/helm

