name: Fake Integration Tests
on:
  pull_request:
    branches: 
      - main
      - ghi223/*
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  push:
    branches:
      - main
      - ghi223/test01
      - ghi223/test03-*
    paths:
      - 'coffeeAGNTCY/coffee_agents/corto/**'
      - 'coffeeAGNTCY/coffee_agents/lungo/**'
      - '!coffeeAGNTCY/coffee_agents/*/deployment/helm/**'
  workflow_call:
    inputs:
      pip_overrides:
        description: 'One-per-line PEP 508 specs to force (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      pip_constraints:
        description: 'One-per-line constraints (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""
      docker_overrides:
        description: 'One-per-line service=image[:tag] (shared across demos; applied only if declared).'
        required: false
        type: string
        default: ""

env:
  CORTO_DIR: coffeeAGNTCY/coffee_agents/corto
  LUNGO_DIR: coffeeAGNTCY/coffee_agents/lungo

jobs:
  subprojects-to-test:
    runs-on: ubuntu-latest
    outputs:
      test_corto: ${{ steps.check-subprojects.outputs.test_corto }}
      test_lungo: ${{ steps.check-subprojects.outputs.test_lungo }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Detect changed paths for main sub-projects
        id: check-subprojects
        run: |
          test_corto=false
          test_lungo=false

          if [[ "${{ github.event_name }}" == "push" && ( "${{ github.ref }}" == refs/heads/main || "${{ github.ref }}" == refs/heads/ghi223/* ) ]]; then
            test_corto=true
            test_lungo=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"

            # Returns 0 if dir has changes, 1 if no changes
            dir_has_changes() (
              local base=$1 head=$2 dir=$3
              set -x # This option only lives in the subshell of this function because the function is defined with () instead of {}.
              ! git diff --name-only --exit-code --ignore-blank-lines $base $head "$dir"
            )
            dir_has_changes $base $head "$CORTO_DIR" && test_corto=true || test_corto=false
            dir_has_changes $base $head "$LUNGO_DIR" && test_lungo=true || test_lungo=false
          fi

          echo "test_corto=$test_corto" | tee -a $GITHUB_OUTPUT
          echo "test_lungo=$test_lungo" | tee -a $GITHUB_OUTPUT


  integration-tests-corto:
    needs: subprojects-to-test
    if: ${{ needs.subprojects-to-test.outputs.test_corto == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.CORTO_DIR }}
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Apply uv overrides/constraints (if applicable) — ${{ env.CORTO_DIR }}
        if: ${{ inputs.pip_overrides != '' || inputs.pip_constraints != '' }}
        uses: ./.github/actions/apply-uv-overrides
        with:
          project_dir: ${{ env.CORTO_DIR }}
          pip_overrides: ${{ inputs.pip_overrides }}
          pip_constraints: ${{ inputs.pip_constraints }}

      - name: Apply compose image overrides (if any) — ${{ env.CORTO_DIR }}
        if: ${{ inputs.docker_overrides != '' }}
        uses: ./.github/actions/apply-container-overrides
        with:
          project_dir: ${{ env.CORTO_DIR }}/
          compose_file: docker-compose.yaml
          docker_overrides: ${{ inputs.docker_overrides }}

      - name: Resolve & install — ${{ env.CORTO_DIR }}
        run: |
          uv lock --upgrade
          uv sync --extra dev
      
      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          AZURE_API_KEY=${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE=${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION=${{ secrets.AZURE_API_VERSION }}
          EOF

      - name: Run integration tests — ${{ env.CORTO_DIR }}
        if: false # TODO: Uncomment this for the real PR
        run: uv run pytest -s

  integration-tests-lungo:
    needs: subprojects-to-test
    if: ${{ needs.subprojects-to-test.outputs.test_lungo == 'true' }}
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ${{ env.LUNGO_DIR }}
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Apply uv overrides/constraints (if applicable) — ${{ env.LUNGO_DIR }}
        if: ${{ inputs.pip_overrides != '' || inputs.pip_constraints != '' }}
        uses: ./.github/actions/apply-uv-overrides
        with:
          project_dir: ${{ env.LUNGO_DIR }}
          pip_overrides: ${{ inputs.pip_overrides }}
          pip_constraints: ${{ inputs.pip_constraints }}

      - name: Apply compose image overrides (if any) — ${{ env.LUNGO_DIR }}
        if: ${{ inputs.docker_overrides != '' }}
        uses: ./.github/actions/apply-container-overrides
        with:
          project_dir: ${{ env.LUNGO_DIR }}/
          compose_file: docker-compose.yaml
          docker_overrides: ${{ inputs.docker_overrides }}

      - name: Resolve & install — ${{ env.LUNGO_DIR }}
        run: |
          uv lock --upgrade
          uv sync --extra dev
      
      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          LLM_MODEL=${{ secrets.LLM_MODEL }}
          AZURE_API_KEY=${{ secrets.AZURE_API_KEY }}
          AZURE_API_BASE=${{ secrets.AZURE_API_BASE }}
          AZURE_API_VERSION=${{ secrets.AZURE_API_VERSION }}
          EOF

      - name: Run integration tests — ${{ env.LUNGO_DIR }}
        if: false # TODO: Uncomment this for the real PR
        run: uv run pytest -s
