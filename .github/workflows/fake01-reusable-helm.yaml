name: Fake Reusable Helm Workflow

on:
  workflow_call:
    inputs:
      path:
        description: 'The path to the chart.'
        required: true
        type: string
      package_name:
        description: 'The package name to use for the chart.'
        required: true
        type: string
      push:
        description: 'Whether to push the chart to the registry.'
        required: false
        type: boolean
        default: false


jobs:
  helm-package-and-push:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read
    
    steps:
      - name: Log inputs
        run: |
          echo "path=${{ inputs.path }}"
          echo "package_name=${{ inputs.package_name }}"
          echo "push=${{ inputs.push }}"

      - name: Pre-cleanup Docker images
        run: docker system prune -af

      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: inputs.push == true
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.18.3"

      - name: Helm lint
        run: helm lint ${{ inputs.path }} --with-subcharts

      - name: Package Helm Chart
        id: package
        run: |
          CHART_VERSION=$(grep '^version:' ${{ inputs.path }}/Chart.yaml | awk '{print $2}')
          helm package ${{ inputs.path }} --dependency-update --version $CHART_VERSION
          echo "chart_version=$CHART_VERSION" | tee -a $GITHUB_OUTPUT

      - name: Push Helm Chart
        if: inputs.push == true
        run: |
          echo "Pushing Helm Chart ${{ inputs.package_name }}-${{ steps.package.outputs.chart_version }}.tgz to oci://ghcr.io/${{ github.repository_owner }}/coffee_agntcy/helm"
          # helm push ${{ inputs.package_name }}-${{ steps.package.outputs.chart_version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/coffee_agntcy/helm
